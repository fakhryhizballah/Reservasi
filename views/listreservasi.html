<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Reservasi Ruangan - RSUD dr. Abdul Aziz</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Animations -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.8s ease-out forwards;
            opacity: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-900 text-slate-100 font-sans overflow-hidden flex flex-col relative">

    <!-- Background Ornamen -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-emerald-600/20 rounded-full blur-[120px] animate-float"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] animate-float" style="animation-delay: 2s;"></div>
        <div class="absolute top-[40%] right-[-10%] w-[30%] h-[30%] bg-orange-500/10 rounded-full blur-[120px] animate-float" style="animation-delay: 4s;"></div>
    </div>

    <!-- Header -->
    <header class="z-10 bg-slate-800/60 backdrop-blur-xl border-b border-emerald-500/20 px-10 py-6 flex justify-between items-center shadow-2xl">
        <div class="flex items-center gap-6">
            <!-- Logo Container -->
            <div class="bg-white p-2 rounded-2xl shadow-[0_0_15px_rgba(16,185,129,0.3)] h-20 w-20 flex items-center justify-center shrink-0">
                <img 
                    src="/reservasi/assets/images/logo.png" 
                    alt="Logo RSUD" 
                    class="max-h-full max-w-full object-contain"
                    onerror="this.onerror=null; this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Lambang_Kota_Singkawang.png/220px-Lambang_Kota_Singkawang.png';"
                />
            </div>
            <div>
                <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-blue-400 tracking-wide uppercase drop-shadow-sm">
                    Jadwal Reservasi Ruangan
                </h1>
                <p class="text-2xl text-emerald-100/70 mt-2 font-light tracking-wider">
                    RSUD dr. Abdul Aziz Singkawang
                </p>
            </div>
        </div>
        
        <div class="text-right flex flex-col items-end">
            <div id="clock-time" class="text-6xl font-black text-white tracking-widest drop-shadow-[0_2px_10px_rgba(16,185,129,0.2)] tabular-nums">
                --:--:--
            </div>
            <div id="clock-date" class="text-2xl text-emerald-400 font-medium mt-2">
                Memuat tanggal...
            </div>
        </div>
    </header>

    <!-- Content Area -->
    <main class="flex-1 p-10 z-10 overflow-hidden flex flex-col">
        
        <!-- Loading State -->
        <div id="loading-indicator" class="flex-1 flex flex-col justify-center items-center">
            <i data-lucide="activity" class="w-24 h-24 text-emerald-500 animate-spin"></i>
            <p class="text-3xl mt-6 text-emerald-300 animate-pulse">Memuat Data Reservasi...</p>
        </div>

        <!-- Error State -->
        <div id="error-alert" class="hidden bg-amber-500/20 border border-amber-500/50 text-amber-200 px-6 py-3 rounded-lg mb-6 text-xl mx-auto flex items-center gap-3">
            <i data-lucide="info" class="w-6 h-6"></i>
            <span id="error-message"></span>
        </div>
        
        <!-- Grid Data Reservasi -->
        <div id="reservations-grid" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8 h-full pb-10 overflow-y-auto pr-4">
            <!-- Data akan dimuat disini menggunakan JavaScript -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 px-8 py-4 border-t border-emerald-900/50 text-xl text-emerald-600/60 flex justify-between z-10">
        <div>Update terakhir: <span id="last-update">--:--:--</span></div>
        <div>&copy; 2026 RSUD dr. Abdul Aziz Singkawang</div>
    </footer>

    <!-- Aplikasi JavaScript -->
     <script src="/reservasi/assets/js/listreservasi.js"></script>
</body>
</html>
